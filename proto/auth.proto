syntax = "proto3";

package auth;

service AuthService {
  // Xác thực token và trả về thông tin user
  rpc VerifyToken (VerifyTokenRequest) returns (VerifyTokenResponse) {}

  // Kiểm tra quyền hạn (Authorize)
  rpc CheckPermission (CheckPermissionRequest) returns (CheckPermissionResponse) {}

  // Lấy danh sách user để các service chọn userId tham chiếu.
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse) {}

  // Kiểm tra userId còn tồn tại trước khi lưu tham chiếu.
  rpc GetUser (GetUserRequest) returns (GetUserResponse) {}
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  bool valid = 1;
  string userId = 2;
  string name = 3;
  string role = 4;
}

message CheckPermissionRequest {
  string userId = 1;
  string permission = 2;
}

message CheckPermissionResponse {
  bool allowed = 1;
}

message ListUsersRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
  string role = 4;
}

message HubUser {
  string userId = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  string role = 5;
  bool isOnline = 6;
  string note = 7;
}

message ListUsersResponse {
  repeated HubUser users = 1;
  int32 totalRecords = 2;
  int32 totalPages = 3;
  int32 currentPage = 4;
  int32 pageSize = 5;
}

message GetUserRequest {
  string userId = 1;
}

message GetUserResponse {
  bool found = 1;
  HubUser user = 2;
}

service LicenseService {
  // Lấy trạng thái kích hoạt của client và danh sách các tính năng được mở khóa
  rpc GetLicenseConfig (LicenseConfigRequest) returns (LicenseConfigResponse) {}
  rpc CheckLicense (LicenseConfigRequest) returns (LicenseConfigResponse) {}
  rpc CreateTicket (CreateTicketRequest) returns (TicketResponse) {}
  rpc ListTickets (ListTicketsRequest) returns (ListTicketsResponse) {}
  rpc GetTicket (GetTicketRequest) returns (TicketResponse) {}
}

message LicenseConfigRequest {
  string licenseKey = 1;
  string softwareId = 2;
}

message LicenseConfigResponse {
  bool active = 1;
  string status = 2; // e.g. "active", "inactive"
  repeated string enabledFeatures = 3; // e.g. ["s3", "mail", "chat"]
  string message = 4;
  string customerName = 5;
  string softwareName = 6;
  string licenseId = 7;
}

message CreateTicketRequest {
  string licenseId = 1;
  string licenseKey = 2;
  string title = 3;
  string message = 4;
  repeated string attachments = 5;
  string status = 6;
  string cancelReason = 7;
  string note = 8;
}

message ListTicketsRequest {
  string licenseId = 1;
  string licenseKey = 2;
  int32 page = 3;
  int32 limit = 4;
  string search = 5;
  string status = 6;
}

message GetTicketRequest {
  string licenseId = 1;
  string licenseKey = 2;
  string ticketId = 3;
}

message Ticket {
  string id = 1;
  string licenseId = 2;
  string title = 3;
  string message = 4;
  repeated string attachments = 5;
  string status = 6;
  string cancelReason = 7;
  string note = 8;
  string createdAt = 9;
  string updatedAt = 10;
}

message TicketResponse {
  bool success = 1;
  string message = 2;
  Ticket ticket = 3;
}

message ListTicketsResponse {
  bool success = 1;
  string message = 2;
  repeated Ticket tickets = 3;
  int32 totalRecords = 4;
  int32 totalPages = 5;
  int32 currentPage = 6;
  int32 pageSize = 7;
}
